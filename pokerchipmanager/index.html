<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLH Tracker</title>
<link rel="stylesheet" href="style.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<div class="container">
  <h1 class="app-title">Stack Ledger</h1>
  <div class="app-subtitle">Poker Stack Manager</div>

  <div class="btn-area">
    <button id="addPlayerBtn">Add Player</button>
    <button id="settingBtn">Game Setting</button>
    <button id="startGameBtn">Start Game</button>
    <button id="nextGameBtn">Next game</button>
  </div>


  <div class="game-info">
    SB: <span id="sb">-</span> /
    BB: <span id="bb">-</span> /
    Ante: <span id="ante">-</span>
    <div>Street: <span id="street">-</span></div>
  </div>
  <div class="pot">Pot: <span id="pot">0</span></div>

  <ul id="playerList"></ul>
</div>


<div id="playerModal" class="modal">
  <div class="modal-content">
    <h2>Add Player</h2>

    <div class="form-group">
      <label>Player Name</label>
      <input type="text" id="playerName">
    </div>

    <div class="form-group">
      <label>Initial Stack</label>
      <input type="number" id="playerStack">
    </div>

    <button id="savePlayer">Save</button>
    <button class="close">Close</button>
  </div>
</div>

<div id="playerModalGameInProgress" class="modal" style="display: none;">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h3>Add Player (In Game)</h3>
    
    <div class="form-group">
      <label>Player Name:</label>
      <input type="text" id="playerNameGameInProgress" placeholder="Enter name">
    </div>
    
    <div class="form-group">
      <label>Initial Stack:</label>
      <input type="number" id="playerStackGameInProgress" placeholder="1000">
    </div>

    <div class="form-group">
      <label style="font-weight: bold; color: #ff7b00;">Who's next ?</label>
      <small style="display:block; color:#6c757d; margin-bottom:5px;">※選択したプレイヤーの次（直後）の手番に挿入されます</small>
      <select id="insertAfterPlayer">
        </select>
    </div>
    
    <button id="savePlayerGameInProgress" class="btn">Add & Insert</button>
  </div>
</div>

<div id="startModal" class="modal">
  <div class="modal-content">
    <h2>Start Game</h2>

    <div class="form-group">
      <label>Button Player</label>
      <select id="btnPlayer"></select>
    </div>

    <button id="startGame">Start</button>
    <button class="close">Close</button>
  </div>
</div>

<div id="distributionModal" class="modal">
  <div class="modal-content">
    <h2>Show Down!</h2>
    <p>Input the distribution amounts for each player.</p>

    <div class="form-group">
      <label>Total Pot</label>
      <div id="distributionTotal">0</div>
    </div>

    <div class="form-group">
      <label>Pot Breakdown</label>
      <div id="distributionBreakdown">-</div>
    </div>

    <div id="distributionList"></div>

    <div class="form-group">
      <label>Remaining</label>
      <div id="distributionRemaining">0</div>
    </div>

    <button id="applyDistribution">Apply</button>
    <button class="close">Close</button>
  </div>
</div>

<div id="settingModal" class="modal">
  <div class="modal-content">
    <h2>Game Setting</h2>

    <div class="form-group">
      <label>Small Blind</label>
      <input type="number" id="sbValue">
    </div>

    <div class="form-group">
      <label>Big Blind</label>
      <input type="number" id="bbValue">
    </div>

    <div class="form-group">
      <label>Ante</label>
      <input type="number" id="anteValue">
    </div>

    <label>Ante Type</label>
    <select id="anteType">
      <option value="all">All Players</option>
      <option value="bb">BB Only</option>
    </select>
    <button id="saveSetting">Apply</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
